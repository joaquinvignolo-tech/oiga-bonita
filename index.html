<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#C8201E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Oiga Bonita"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oiga Bonita — Kiosco</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --rojo: #C8201E;
  --rojo-dark: #A01818;
  --rojo-light: #FDF0F0;
  --blanco: #FFFFFF;
  --gris: #F7F6F4;
  --gris-borde: #E8E6E2;
  --texto: #1A1A1A;
  --texto-suave: #777770;
  --radio: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gris); color: var(--texto); }
.app {
  max-width: 440px; margin: 0 auto; height: 100vh;
  display: flex; flex-direction: column; background: var(--blanco);
  box-shadow: 0 0 60px rgba(0,0,0,0.12);
}

/* HEADER */
.header { background: var(--rojo); padding: 14px 18px 12px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; gap: 12px; }
.header-logo { height: 36px; filter: brightness(0) invert(1); flex-shrink: 0; }
.header-info { flex: 1; }
.header-sub { font-size: 11px; color: rgba(255,255,255,.65); letter-spacing: .5px; }
.ai-indicator { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.12); border-radius: 20px; padding: 5px 10px; border: 1px solid rgba(255,255,255,.15); }
.ai-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.ai-label { font-size: 11px; color: rgba(255,255,255,.85); font-weight: 500; }

/* HORARIO BANNER */
.horario-banner {
  padding: 4px 18px 8px; flex-shrink: 0;
  display: flex; align-items: center; gap: 6px; font-size: 11px;
  background: var(--rojo);
}
.horario-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.horario-dot.abierto { background: #4ade80; }
.horario-dot.cerrado { background: #fca5a5; }
.horario-txt { color: rgba(255,255,255,.75); }
.horario-txt strong { color: #fff; font-weight: 500; }

/* ORDER BAR */
.order-bar {
  background: var(--rojo-light); border-bottom: 1px solid #F0C8C8;
  padding: 9px 18px; display: none; cursor: pointer; transition: background .15s; flex-shrink: 0;
}
.order-bar:hover { background: #FAE0E0; }
.order-bar-row { display: flex; justify-content: space-between; align-items: center; }
.order-bar-left { font-size: 13px; font-weight: 500; color: var(--rojo-dark); }
.order-bar-right { display: flex; align-items: center; gap: 8px; }
.order-count { background: var(--rojo); color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
.order-total-bar { font-size: 13px; font-weight: 500; color: var(--rojo-dark); }
.order-hint { font-size: 11px; color: #A04040; margin-top: 2px; }

/* CHAT */
.chat-window {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
  background: var(--gris);
}
.chat-window::-webkit-scrollbar { width: 3px; }
.chat-window::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 4px; }
.msg-wrap { display: flex; flex-direction: column; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot { align-items: flex-start; }
.sender-name { font-size: 10px; color: var(--texto-suave); margin-bottom: 3px; padding: 0 4px; letter-spacing: .3px; }
.bubble {
  max-width: 82%; padding: 11px 15px; border-radius: 20px;
  font-size: 14px; line-height: 1.55; animation: popIn .2s ease;
}
@keyframes popIn { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }
.bubble.bot { background: var(--blanco); color: var(--texto); border-bottom-left-radius: 4px; border: 1px solid var(--gris-borde); }
.bubble.user { background: var(--rojo); color: #fff; border-bottom-right-radius: 4px; }
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing-dots span { width: 7px; height: 7px; background: #bbb; border-radius: 50%; animation: blink 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* QUICK BUTTONS */
.quick-area { padding: 8px 6px; display: flex; flex-wrap: nowrap; gap: 6px; flex-shrink: 0; background: var(--blanco); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; min-width: 0; }
.quick-area::-webkit-scrollbar { display: none; }
.quick-area .quick-btn { flex-shrink: 0; white-space: nowrap; }
.quick-btn {
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  padding: 6px 13px; border-radius: 20px; border: 1px solid var(--gris-borde);
  background: var(--gris); color: var(--texto); cursor: pointer; transition: all .15s; font-weight: 500;
}
.quick-btn:hover { border-color: var(--rojo); color: var(--rojo); background: var(--rojo-light); }

/* INPUT */
.input-area {
  padding: 10px 14px 14px; border-top: 1px solid var(--gris-borde);
  display: flex; gap: 8px; align-items: center; background: var(--blanco); flex-shrink: 0;
}
.input-area input {
  flex: 1; padding: 11px 16px; border-radius: 24px;
  border: 1.5px solid var(--gris-borde); background: var(--gris);
  color: var(--texto); font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s;
}
.input-area input:focus { border-color: var(--rojo); background: #fff; }
.input-area input:disabled { opacity: .5; }
.send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--rojo);
  color: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s, transform .1s; flex-shrink: 0;
}
.send-btn:hover { background: var(--rojo-dark); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; fill: #fff; }

/* ORDER DETAIL */
.order-detail {
  display: none; background: var(--blanco); border-top: 2px solid var(--rojo);
  padding: 16px 18px; flex-shrink: 0; animation: slideUp .2s ease;
}
@keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
.order-detail h3 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--rojo); margin-bottom: 10px; }
.order-item-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--gris-borde); color: var(--texto); }
.order-total-row { display: flex; justify-content: space-between; font-weight: 500; font-size: 15px; color: var(--texto); margin-top: 8px; padding-top: 8px; border-top: 2px solid var(--gris-borde); }
.confirm-btn {
  width: 100%; margin-top: 12px; padding: 13px; background: var(--rojo); color: #fff;
  border: none; border-radius: var(--radio); font-size: 15px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s; letter-spacing: .3px;
}
.confirm-btn:hover { background: var(--rojo-dark); }
.close-order { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--texto-suave); line-height: 1; }

/* CERRADO OVERLAY */
.cerrado-banner {
  background: #1A1A1A; color: #fff; padding: 10px 18px;
  font-size: 13px; text-align: center; flex-shrink: 0; display: none;
}
.cerrado-banner strong { color: #fca5a5; }
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>

<script>
const WA_NUMBER = "543544650156";

// ═══ CONFIGURACIÓN DE DELIVERY ═══
const KIOSCO_LAT = -31.94762147502959;
const KIOSCO_LNG = -65.05350821325112;
const DELIVERY_CONFIG = {
  envioGratis: 30000,
  horarios: {
    // 0=domingo, 1=lun...6=sab
    lunes:    { inicio: 9, fin: 21, disponible: true },
    martes:   { inicio: 9, fin: 21, disponible: true },
    miercoles:{ inicio: 9, fin: 21, disponible: true },
    jueves:   { inicio: 9, fin: 21, disponible: true },
    viernes:  { inicio: 9, fin: 21, disponible: true },
    sabado:   { inicio: 9, fin: 21, disponible: true, consultarPrecio: true },
    domingo:  { inicio: 9, fin: 21, disponible: true, consultarPrecio: true },
    fueraHorario: { disponible: true, consultarPrecio: true }
  },
  zonas: [
    { km: 3, precio: 2000, label: 'zona centro' },
    { km: 99, precio: 3000, label: 'zona extendida' }
  ]
};

function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function calcularCostoDelivery(lat, lng, totalPedido) {
  const now = ahoraArgentina ? ahoraArgentina() : new Date();
  const dia = now.getDay(); // 0=dom, 1=lun...6=sab
  const hora = now.getHours() + now.getMinutes() / 60;
  const distancia = calcularDistanciaKm(KIOSCO_LAT, KIOSCO_LNG, lat, lng);
  
  // Verificar horario de Chasqui (L-V 9-21)
  const esSemana = dia >= 1 && dia <= 5;
  const enHorario = hora >= 9 && hora < 21;
  const esFinDeSemana = dia === 0 || dia === 6;
  
  // Envío gratis
  if (totalPedido >= DELIVERY_CONFIG.envioGratis) {
    if (esFinDeSemana || !enHorario) {
      return { 
        costo: 0, gratis: true, disponible: true, 
        consultar: true,
        msg: `¡Envío gratis por tu compra mayor a $${DELIVERY_CONFIG.envioGratis.toLocaleString('es-AR')}! 🎉 Como estamos fuera del horario habitual de Chasqui, te contactamos para coordinar.`,
        distancia: distancia.toFixed(1)
      };
    }
    return { 
      costo: 0, gratis: true, disponible: true, consultar: false,
      msg: `¡Envío gratis por tu compra mayor a $${DELIVERY_CONFIG.envioGratis.toLocaleString('es-AR')}! 🎉`,
      distancia: distancia.toFixed(1)
    };
  }
  
  // Fines de semana o fuera de horario → consultar precio
  if (esFinDeSemana || !enHorario) {
    return {
      costo: null, gratis: false, disponible: true, consultar: true,
      msg: `El delivery está disponible pero fuera del horario habitual. Te contactamos para coordinar el envío y el costo. 📞`,
      distancia: distancia.toFixed(1)
    };
  }
  
  // L-V 9-21: calcular por zona
  const zona = DELIVERY_CONFIG.zonas.find(z => distancia <= z.km);
  const costo = zona ? zona.precio : DELIVERY_CONFIG.zonas[DELIVERY_CONFIG.zonas.length-1].precio;
  const label = zona ? zona.label : 'zona extendida';
  
  return {
    costo, gratis: false, disponible: true, consultar: false,
    msg: `El costo de delivery para tu zona es $${costo.toLocaleString('es-AR')} (${label}, ${distancia.toFixed(1)}km).`,
    distancia: distancia.toFixed(1)
  };
}
const API_KEY = "TU_API_KEY_AQUI";

// HORARIOS (0=domingo, 1=lunes ... 6=sabado)
const HORARIOS = {
  0: { abre: 8,  cierra: 24, label: "Dom" },
  1: { abre: 7,  cierra: 24, label: "Lun" },
  2: { abre: 7,  cierra: 24, label: "Mar" },
  3: { abre: 7,  cierra: 24, label: "Mie" },
  4: { abre: 7,  cierra: 24, label: "Jue" },
  5: { abre: 7,  cierra: 25, label: "Vie" },
  6: { abre: 8,  cierra: 25, label: "Sab" },
};

function ahoraArgentina() {
  return new Date(new Date().toLocaleString("en-US", {timeZone: "America/Argentina/Cordoba"}));
}

function estaAbierto() {
  const now = ahoraArgentina();
  const dia = now.getDay();
  const hora = now.getHours() + now.getMinutes() / 60;
  
  // Verificar si estamos en la madrugada que corresponde al cierre del día anterior
  // Ej: sábado 00:30 puede ser el cierre del viernes (que cierra a las 25 = 01:00)
  if (hora < 6) {
    const diaAnterior = (dia + 6) % 7;
    const hAnterior = HORARIOS[diaAnterior];
    if (hAnterior.cierra > 24 && hora < (hAnterior.cierra - 24)) {
      return true;
    }
  }
  
  const h = HORARIOS[dia];
  return hora >= h.abre && hora < h.cierra;
}

function proximaApertura() {
  const now = ahoraArgentina();
  const dia = now.getDay();
  for (let i = 1; i <= 7; i++) {
    const nextDia = (dia + i) % 7;
    const h = HORARIOS[nextDia];
    return `Abrimos el ${h.label} a las ${h.abre}:00 hs`;
  }
  return "Reabrimos pronto";
}

function horarioHoy() {
  const dia = ahoraArgentina().getDay();
  const h = HORARIOS[dia];
  const cierra = h.cierra > 24 ? `0${h.cierra-24}:00` : `${h.cierra}:00`;
  return `Abierto hasta las ${cierra} hs`;
}

    txt.innerHTML = `<strong>Cerrado</strong>`;
    banner.style.display = 'block';
    prox.textContent = proximaApertura();
  }
}

}

  const w = document.getElementById('chatWindow');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  const name = document.createElement('div');
  name.className = 'sender-name';
  name.textContent = 'Oiga Bonita';
  wrap.appendChild(name);
  const b = document.createElement('div');
  b.className = 'bubble bot';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(b);
  w.appendChild(wrap);
  w.scrollTop = w.scrollHeight;
  return b;
}

function updateOrderUI() {
  const bar = document.getElementById('orderBar');
  if (order.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const qty = order.reduce((a,i)=>a+i.qty,0);
  const total = order.reduce((a,i)=>a+i.price*i.qty,0);
  document.getElementById('orderCount').textContent = qty;
  document.getElementById('orderTotalBar').textContent = '$' + total.toLocaleString('es-AR');
  document.getElementById('orderTotalDetail').textContent = '$' + total.toLocaleString('es-AR');
  document.getElementById('orderItems').innerHTML = order.map(i =>
    `<div class="order-item-row"><span>${i.qty}x ${i.name}</span><span>$${(i.price*i.qty).toLocaleString('es-AR')}</span></div>`
  ).join('');
}

function toggleOrderDetail() {
  const d = document.getElementById('orderDetail');
  orderDetailVisible = !orderDetailVisible;
  d.style.display = orderDetailVisible ? 'block' : 'none';
}

function confirmarPedidoConNombre(nombre, metodo) {
  window._metodoPago = metodo || 'efectivo';
  if (!navigator.geolocation) {
    addMsg('Tu dispositivo no soporta GPS. Por favor escribinos directamente al WhatsApp para coordinar la entrega.', 'bot');
    return;
  }
  const btnGPS = `<button onclick="pedirGPS('${nombre}')" style="background:var(--rojo);color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer">Compartir ubicación y confirmar</button>`;
  addMsg('Para confirmar necesitamos tu ubicación GPS. Activá el GPS y tocá el botón:<br><br>' + btnGPS, 'bot');
}

function pedirGPS(nombre) {
  // Deshabilitar todos los botones de GPS para evitar doble disparo
  document.querySelectorAll('button[onclick^="pedirGPS"]').forEach(b => {
    b.disabled = true;
    b.style.opacity = '0.5';
  });
  addMsg('Obteniendo ubicación GPS...', 'user');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lon = pos.coords.longitude.toFixed(6);
      const mapsLink = `https://maps.google.com/?q=${lat},${lon}`;
      const lines = order.map(i=>`• ${i.qty}x ${i.name} — $${(i.price*i.qty).toLocaleString('es-AR')}`).join('%0A');
      const total = order.reduce((a,i)=>a+i.price*i.qty,0);
      
      // Calcular costo de delivery
      const delivery = calcularCostoDelivery(parseFloat(lat), parseFloat(lon), total);
      const costoDelivery = delivery.gratis ? 0 : (delivery.costo || 0);
      const totalConDelivery = total + costoDelivery;
      window._deliveryInfo = delivery;
      const deliveryLine = delivery.gratis ? `%0A🚚 *Delivery: GRATIS* 🎉` : 
        delivery.costo ? `%0A🚚 *Delivery: $${delivery.costo.toLocaleString('es-AR')}*` :

function confirmarPedido() {
  if (order.length === 0) return;
  confirmarPedidoConNombre(window._clienteName || 'Cliente');
}

function findProductInText(text) {
  const lower = text.toLowerCase();
  let best = null;
  let bestScore = 0;
  for (const prod of PRODUCTS) {
    const words = prod.name.toLowerCase().split(' ');
    let score = 0;
    for (const word of words) {
      if (word.length > 3 && lower.includes(word)) score++;
    }
    if (score > bestScore) { bestScore = score; best = prod; }
  }
  return bestScore >= 2 ? best : null;
}

function extractQty(text) {
  const m = text.match(/\b(\d+)\s*(unidades?|u\.|x)?\b/i);
  return m ? parseInt(m[1]) : 1;
}

function parseCommands(text) {
  let clean = text;
  const adds = [...text.matchAll(/AGREGAR:([^:|]+):(\d+)/g)];
  for (const m of adds) {
    if (window._pedidoConfirmado) break; // no agregar si ya se confirmó
    const name = m[1].trim();
    const qty = parseInt(m[2]);
    const prod = PRODUCTS.find(p=>p.name.toLowerCase()===name.toLowerCase());
    if (prod) {
      const ex = order.find(i=>i.name===prod.name);
      if (ex) ex.qty += qty;
      else order.push({...prod, qty});
    }
    clean = clean.replace(m[0],'');
  }
  const sacars = [...text.matchAll(/SACAR:([^:|]+)/g)];
  for (const m of sacars) {
    const name = m[1].trim();
    const idx = order.findIndex(i => i.name.toLowerCase() === name.toLowerCase());
    if (idx > -1) order.splice(idx, 1);
    clean = clean.replace(m[0], '');
  }

  const cargaMatches = [...text.matchAll(/CARGA:([^:]+):(\d+)/g)];
  for (const m of cargaMatches) {
    const nombre = m[1].trim();
    const precio = parseInt(m[2]);
    const ex = order.find(i=>i.name===nombre);
    if (ex) ex.price = precio;
    else order.push({name: nombre, price: precio, qty: 1, cat: 'cargas'});
    clean = clean.replace(m[0], '');
  }
  if (/\bHUMANO\b/i.test(text)) {
    clean = clean.replace(/\bHUMANO\b/gi, '').trim();
    const waUrl = `https://wa.me/${WA_NUMBER}?text=Hola! Quiero hablar con alguien del kiosco.`;
    setTimeout(() => {
      addMsg(`¡Dale! Te conectamos directo con el equipo de Oiga Bonita 🛵<br><br><em style="font-size:12px;color:#888">Tené en cuenta que la atención puede demorar un ratito según el horario.</em><br><br><a href="${waUrl}" target="_blank" style="display:inline-block;background:#25D366;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;text-decoration:none;margin-top:8px">Hablar con el kiosco por WhatsApp</a>`, 'bot');
    }, 300);
  }

  const confirmMatch = text.match(/CONFIRMAR:([^|]+)\|(efectivo|mp|gps)/i);
  if (confirmMatch) {
    window._clienteName = confirmMatch[1].trim();
    window._metodoPago = confirmMatch[2].toLowerCase();
    clean = clean.replace(/CONFIRMAR:[^|]+\|(efectivo|mp|gps)/i,'').trim();
    setTimeout(()=> confirmarPedidoConNombre(window._clienteName, window._metodoPago), 300);
  }
  return clean.replace(/\|/g,'').trim();
}

function modificarPedido() {
  window._pedidoConfirmado = false; // permitir nuevos AGREGARs
  order = [];
  window._mpItems = [];
  updateOrderUI();
  addMsg('¡Claro! Limpiamos el pedido. Decime qué querés pedir de nuevo.', 'bot');
}

async function pagarConMP(btn) {
  btn.textContent = 'Generando link...';
  btn.disabled = true;
  try {
    // Usar el carrito actual si está disponible, sino _mpItems, sino localStorage
    let items = order.filter(i => i.price > 0).map(i => ({name: i.name, qty: Number(i.qty), price: Number(i.price)}));
    if (!items.length) items = window._mpItems || [];
    if (!items.length) {
      const saved = localStorage.getItem('ob_mp_items');
      if (saved) items = JSON.parse(saved);
    }
    // Actualizar _mpItems y localStorage con los items actuales
    if (items.length) {
      window._mpItems = items;
      localStorage.setItem('ob_mp_items', JSON.stringify(items));
    }
    const nombre = window._mpNombre || localStorage.getItem('ob_mp_nombre') || 'Cliente';
    const resp = await fetch('/api/payment', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ items, payer_name: nombre })
    });
    const data = await resp.json();
    if (data.init_point) {
      window._mpInitPoint = data.init_point;
      localStorage.setItem('ob_mp_nombre', nombre);
      localStorage.setItem('ob_mp_items', JSON.stringify(items));
      localStorage.setItem('ob_mp_maps', window._mpMapsLink || '');
      // Guardar historial del chat para restaurar si el cliente vuelve
      const chatWindow = document.getElementById('chatWindow');
      localStorage.setItem('ob_mp_chat', chatWindow ? chatWindow.innerHTML : '');
      window.location.href = data.init_point;
      btn.textContent = 'Abrir Mercado Pago de nuevo';
      btn.disabled = false;
      btn.onclick = () => window.open(data.init_point, '_blank');
      // Mostrar mensaje de comprobante
      const lines = (window._mpItems||[]).map(i=>`• ${i.qty}x ${i.name} — $${(i.price*i.qty).toLocaleString('es-AR')}`).join('%0A');
      const total = (window._mpItems||[]).reduce((a,i)=>a+i.price*i.qty,0);
      const mapsLink = window._mpMapsLink || '';
      const ubicacionBlock = mapsLink ? `%0A%0A📍 *Ubicacion:*%0A${encodeURIComponent(mapsLink)}` : '';
      const waMsg = `Pedido *Oiga Bonita*%0A%0A👤 *${nombre}*%0A%0A${lines}%0A%0A💰 *Total: $${total.toLocaleString('es-AR')}*%0A%0A✅ *Pagado con Mercado Pago*${ubicacionBlock}%0A%0A📎 Comprobante adjunto`;
      const waUrl = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;
      addMsg(`¡Pago listo! 🎉 Para confirmar tu entrega mandanos por WhatsApp:<br><br>1️⃣ Una captura del <strong>comprobante de pago</strong> de MP<br>2️⃣ Este mensaje con tu pedido<br><br><a href="${waUrl}" target="_blank" style="display:inline-block;background:#25D366;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;text-decoration:none">Enviar comprobante + pedido</a>`, 'bot');
    } else {
      btn.textContent = 'Error — intentá de nuevo';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Error — intentá de nuevo';
    btn.disabled = false;
  }
}

async function callClaude(userMsg) {
  history.push({role:'user', content: userMsg});
  const resp = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:400,
      system: buildSystemPrompt(),
      messages: history
    })
  });
  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  const raw = data.content?.[0]?.text || 'Perdona, hubo un problema. Intenta de nuevo.';
  history.push({role:'assistant', content: raw});
  return raw;
}

async function sendMsg() {
  const inp = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const txt = inp.value.trim();
  if (!txt || isLoading) return;
  // Si el cliente escribe algo después de confirmar, permitir modificaciones y limpiar items viejos
  window._pedidoConfirmado = false;
  window._mpItems = [];
  inp.value = '';
  btn.disabled = true;
  addMsg(txt, 'user');
  isLoading = true;
  inp.disabled = true;
  const typing = addTyping();
  try {
    const raw = await callClaude(txt);
    const clean = parseCommands(raw);
    
        updateOrderUI();
    typing.innerHTML = clean.replace(/\n/g,'<br>');
  } catch(e) {
    typing.innerHTML = 'Hubo un error de conexion. Intenta de nuevo.';
  }
  isLoading = false;
  inp.disabled = false;
  btn.disabled = false;
  inp.focus();
  document.getElementById('chatWindow').scrollTop = 99999;
}

function sendQuick(txt) {
  document.getElementById('userInput').value = txt;
  document.getElementById('sendBtn').disabled = false;
  sendMsg();
}

document.getElementById('userInput').addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = this.value.trim() === '';
});

function scrollBtns(amount) {
  const el = document.getElementById('quickArea');
  el.scrollBy({ left: amount, behavior: 'smooth' });
}

// ═══ CARRUSEL ═══
let carruselIndex = 0;
let carruselFotos = [];
let carruselTimer = null;

async function loadCarrusel() {
  try {
    const resp = await fetch('/api/promos-get');
    const data = await resp.json();
    if (data.fotos && Array.isArray(data.fotos) && data.fotos.length > 0) {
      carruselFotos = data.fotos.filter(f => f.activa);
      if (carruselFotos.length > 0) {
      renderCarrusel();
    } else {
      const carruselEl = document.getElementById('carrusel');
      if (carruselEl) carruselEl.style.display = 'none';
    }
    }
  } catch(e) {}
}

function renderCarrusel() {
  const wrap = document.getElementById('carrusel');
  const track = document.getElementById('carruselTrack');
  const dots = document.getElementById('carruselDots');
  if (!wrap || carruselFotos.length === 0) return;
  
  // Ocultar skeleton y mostrar carrusel
  const skeleton = document.getElementById('carruselSkeleton');
  if (skeleton) skeleton.style.display = 'none';
  const btnPrev = document.getElementById('carruselBtnPrev');
  const btnNext = document.getElementById('carruselBtnNext');
  if (btnPrev) btnPrev.style.display = 'block';
  if (btnNext) btnNext.style.display = 'block';
  track.style.display = 'flex';
  track.innerHTML = carruselFotos.map(f => `
    <div style="min-width:100%;height:180px;flex-shrink:0;position:relative">
      <img src="${f.url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"/>
      ${f.texto ? `<div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:8px 12px;color:#fff;font-size:13px;font-weight:500">${f.texto}</div>` : ''}
    </div>`).join('');
  
  dots.innerHTML = carruselFotos.map((_,i) => 
    `<div onclick="goCarrusel(${i})" style="width:6px;height:6px;border-radius:50%;background:${i===0?'#fff':'rgba(255,255,255,.4)'};cursor:pointer;transition:background .3s"></div>`
  ).join('');
  
  if (carruselFotos.length > 1) {
    carruselTimer = setInterval(() => carruselNext(), 4000);
  }
}

function goCarrusel(n) {
  carruselIndex = n;
  const track = document.getElementById('carruselTrack');
  if (track) track.style.transform = `translateX(-${n*100}%)`;
  document.querySelectorAll('#carruselDots div').forEach((d,i) => {
    d.style.background = i===n ? '#fff' : 'rgba(255,255,255,.4)';
  });
}

function carruselNext() {
  goCarrusel((carruselIndex + 1) % carruselFotos.length);
}
function carruselPrev() {
  goCarrusel((carruselIndex - 1 + carruselFotos.length) % carruselFotos.length);
}

const urlParams = new URLSearchParams(window.location.search);
const estadoPago = urlParams.get('pago');

if (estadoPago === 'ok') {
  const nombreGuardado = localStorage.getItem('ob_mp_nombre') || 'Cliente';
  const itemsGuardados = JSON.parse(localStorage.getItem('ob_mp_items') || '[]');
  const mapsGuardado = localStorage.getItem('ob_mp_maps') || '';
  const lines = itemsGuardados.map(i=>`• ${i.qty}x ${i.name} — $${(i.price*i.qty).toLocaleString('es-AR')}`).join('%0A');
  const total = itemsGuardados.reduce((a,i)=>a+i.price*i.qty,0);
  const ubicacionBlock = mapsGuardado ? `%0A%0A📍 *Ubicacion:*%0A${encodeURIComponent(mapsGuardado)}` : '';
  const waMsg = `Pedido *Oiga Bonita*%0A%0A👤 *${nombreGuardado}*%0A%0A${lines}%0A%0A💰 *Total: $${total.toLocaleString('es-AR')}*%0A%0A✅ *Pagado con Mercado Pago*${ubicacionBlock}%0A%0A📎 Comprobante adjunto`;
  const waUrl = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;
  addMsg(`¡Pago aprobado! 🎉<br><br>Para confirmar tu entrega mandanos por WhatsApp:<br>1️⃣ Una captura del <strong>comprobante de MP</strong><br>2️⃣ Este mensaje con tu pedido<br><br><a href="${waUrl}" target="_blank" style="display:inline-block;background:#25D366;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:500;text-decoration:none">Enviar comprobante + pedido</a>`, 'bot');
  // Guardar historial al confirmar pago
  const itemsOk = JSON.parse(localStorage.getItem('ob_mp_items') || '[]');
  const nombreOk = localStorage.getItem('ob_mp_nombre') || 'Cliente';
  if (itemsOk.length > 0) {
    const pedidoOk = {
      nombre: nombreOk,
      detalle: itemsOk.map(i=>`${i.qty}x ${i.name}`).join(', '),
      items: itemsOk,
      total: itemsOk.reduce((a,i)=>a+i.price*i.qty,0),
      hora: new Date().toLocaleString('es-AR', {timeZone:'America/Argentina/Cordoba', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
    };
    fetch('/api/orders-save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(pedidoOk)
    }).catch(e => console.error('Error guardando pedido MP:', e));
  }
  localStorage.removeItem('ob_mp_nombre');
  localStorage.removeItem('ob_mp_items');
  localStorage.removeItem('ob_mp_maps');
  history.replaceState({}, '', '/');
} else if (estadoPago === 'error' || estadoPago === 'pendiente') {
  const chatGuardado = localStorage.getItem('ob_mp_chat');
  if (chatGuardado) {
    const chatWindow = document.getElementById('chatWindow');
    if (chatWindow) chatWindow.innerHTML = chatGuardado;
  }
  addMsg('Hubo un problema con el pago. Podés intentar de nuevo o pagar en efectivo cuando llegue el delivery.', 'bot');
  history.replaceState({}, '', '/');
} else {
  const bienvenida = estaAbierto()
    ? 'Hola! Bienvenido/a a <strong>Oiga Bonita</strong> ✨ Tenemos de todo para vos. ¿Qué estás buscando?'
    : 'Hola! Estamos cerrados por ahora. Podés hacer tu pedido igual y te contactamos cuando abramos.';
  addMsg(bienvenida, 'bot');
}

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'flex';
});

function instalarPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'none';
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error:', e));
  });
}
