<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Oiga Bonita — Kiosco</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --rojo: #D92B2B;
  --rojo-dark: #B01F1F;
  --rojo-light: #FDEAEA;
  --blanco: #FFFFFF;
  --gris: #F5F5F3;
  --gris-borde: #E8E8E6;
  --texto: #1A1A1A;
  --texto-suave: #666660;
  --radio: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--gris); color: var(--texto); }
.app {
  max-width: 440px; margin: 0 auto; height: 100vh;
  display: flex; flex-direction: column; background: var(--blanco);
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
}
.header { background: var(--rojo); padding: 16px 20px 14px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; gap: 10px; }
.logo-circle {
  width: 40px; height: 40px; background: rgba(255,255,255,0.15);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #fff;
  letter-spacing: 1px; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; letter-spacing: 2px; line-height: 1; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 1px; }
.ai-indicator { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 10px; }
.ai-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.ai-label { font-size: 11px; color: rgba(255,255,255,0.9); font-weight: 500; }
.order-bar {
  background: var(--rojo-light); border-bottom: 1.5px solid #F5C0C0;
  padding: 10px 20px; display: none; cursor: pointer; transition: background .15s; flex-shrink: 0;
}
.order-bar:hover { background: #FBDADA; }
.order-bar-row { display: flex; justify-content: space-between; align-items: center; }
.order-bar-left { font-size: 13px; font-weight: 500; color: var(--rojo-dark); }
.order-bar-right { display: flex; align-items: center; gap: 8px; }
.order-count { background: var(--rojo); color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
.order-total-bar { font-size: 13px; font-weight: 500; color: var(--rojo-dark); }
.order-hint { font-size: 11px; color: #B04040; margin-top: 2px; }
.chat-window {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
.chat-window::-webkit-scrollbar { width: 4px; }
.chat-window::-webkit-scrollbar-thumb { background: var(--gris-borde); border-radius: 4px; }
.msg-wrap { display: flex; flex-direction: column; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.bot { align-items: flex-start; }
.sender-name { font-size: 10px; color: var(--texto-suave); margin-bottom: 3px; padding: 0 4px; }
.bubble {
  max-width: 82%; padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; animation: popIn .2s ease;
}
@keyframes popIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.bubble.bot { background: var(--gris); color: var(--texto); border-bottom-left-radius: 4px; }
.bubble.user { background: var(--rojo); color: #fff; border-bottom-right-radius: 4px; }
.typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
.typing-dots span { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: blink 1.2s infinite; }
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.quick-area { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
.quick-btn {
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--gris-borde);
  background: var(--blanco); color: var(--texto); cursor: pointer; transition: all .15s; font-weight: 500;
}
.quick-btn:hover { border-color: var(--rojo); color: var(--rojo); background: var(--rojo-light); }
.input-area {
  padding: 12px 16px 16px; border-top: 1px solid var(--gris-borde);
  display: flex; gap: 8px; align-items: center; background: var(--blanco); flex-shrink: 0;
}
.input-area input {
  flex: 1; padding: 11px 16px; border-radius: 24px;
  border: 1.5px solid var(--gris-borde); background: var(--gris);
  color: var(--texto); font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s;
}
.input-area input:focus { border-color: var(--rojo); background: #fff; }
.input-area input:disabled { opacity: .5; }
.send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--rojo);
  color: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s, transform .1s; flex-shrink: 0;
}
.send-btn:hover { background: var(--rojo-dark); }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; fill: #fff; }
.order-detail {
  display: none; background: var(--blanco); border-top: 2px solid var(--rojo);
  padding: 16px 20px; flex-shrink: 0; animation: slideUp .2s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.order-detail h3 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--rojo); margin-bottom: 10px; }
.order-item-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--gris-borde); color: var(--texto); }
.order-total-row { display: flex; justify-content: space-between; font-weight: 500; font-size: 15px; color: var(--texto); margin-top: 8px; padding-top: 8px; border-top: 2px solid var(--gris-borde); }
.confirm-btn {
  width: 100%; margin-top: 12px; padding: 13px; background: var(--rojo); color: #fff;
  border: none; border-radius: var(--radio); font-size: 15px; font-weight: 500;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .15s;
}
.confirm-btn:hover { background: var(--rojo-dark); }
.close-order { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--texto-suave); line-height: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo-circle">OB</div>
      <div class="header-info">
        <div class="header-title">Oiga Bonita</div>
        <div class="header-sub">Kiosco · Pedidos a domicilio</div>
      </div>
      <div class="ai-indicator">
        <div class="ai-dot"></div>
        <span class="ai-label">IA activa</span>
      </div>
    </div>
  </div>

  <div class="order-bar" id="orderBar" onclick="toggleOrderDetail()">
    <div class="order-bar-row">
      <span class="order-bar-left">Tu pedido</span>
      <div class="order-bar-right">
        <span class="order-count" id="orderCount">0</span>
        <span class="order-total-bar" id="orderTotalBar">$0</span>
      </div>
    </div>
    <div class="order-hint">Tocá para ver o confirmar</div>
  </div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="quick-area">
    <button class="quick-btn" onclick="sendQuick('Qué tienen?')">Qué tienen?</button>
    <button class="quick-btn" onclick="sendQuick('Quiero algo dulce')">Algo dulce</button>
    <button class="quick-btn" onclick="sendQuick('Dame una gaseosa')">Gaseosa</button>
    <button class="quick-btn" onclick="sendQuick('Cigarrillos')">Cigarrillos</button>
    <button class="quick-btn" onclick="sendQuick('Confirmar pedido')">Confirmar pedido</button>
  </div>

  <div class="order-detail" id="orderDetail">
    <button class="close-order" onclick="toggleOrderDetail()">×</button>
    <h3>Tu pedido</h3>
    <div id="orderItems"></div>
    <div class="order-total-row"><span>Total</span><span id="orderTotalDetail">$0</span></div>
    <button class="confirm-btn" onclick="confirmarPedido()">Confirmar y enviar por WhatsApp</button>
  </div>

  <div class="input-area">
    <input id="userInput" type="text" placeholder="Escribí lo que querés..." onkeydown="if(event.key==='Enter'&&!this.disabled)sendMsg()"/>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// =============================================
// CONFIGURACIÓN — editá estos valores
// =============================================
const WA_NUMBER = "543513958555"; // Tu número de WhatsApp con código de país (54 = Argentina)
const API_KEY = "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"; // Pegá tu API key de Anthropic acá
// =============================================

const DEFAULT_PRODUCTS = [
  {name:"Coca-Cola 500ml",price:800,cat:"bebidas"},
  {name:"Sprite 500ml",price:800,cat:"bebidas"},
  {name:"Fanta naranja 500ml",price:800,cat:"bebidas"},
  {name:"Agua mineral 500ml",price:500,cat:"bebidas"},
  {name:"Jugo Cepita naranja",price:700,cat:"bebidas"},
  {name:"Alfajor Havanna",price:950,cat:"chocolates"},
  {name:"Alfajor Milka",price:700,cat:"chocolates"},
  {name:"Kit Kat",price:850,cat:"chocolates"},
  {name:"Twix",price:850,cat:"chocolates"},
  {name:"Maní con chocolate",price:600,cat:"golosinas"},
  {name:"Gomitas",price:400,cat:"golosinas"},
  {name:"Chupetín",price:200,cat:"golosinas"},
  {name:"Caramelos surtidos x10",price:300,cat:"golosinas"},
  {name:"Cigarrillos Marlboro",price:2200,cat:"cigarrillos"},
  {name:"Cigarrillos Philip Morris",price:2100,cat:"cigarrillos"},
  {name:"Cigarrillos Camel",price:2300,cat:"cigarrillos"},
];
const saved = localStorage.getItem('ob_products');
const PRODUCTS = saved ? JSON.parse(saved) : DEFAULT_PRODUCTS;

const SYSTEM_PROMPT = `Sos el asistente virtual del kiosco "Oiga Bonita" en Argentina. Sos simpático, informal y usás el voseo rioplatense. Tu trabajo es ayudar a los clientes a elegir y pedir productos.

CATÁLOGO:
${PRODUCTS.map(p=>`- ${p.name}: $${p.price.toLocaleString('es-AR')} (${p.cat})`).join('\n')}

INSTRUCCIONES:
1. Cuando el cliente quiere agregar un producto, incluí al FINAL de tu respuesta (sin mostrarlo visualmente):
   AGREGAR:[nombre exacto del producto]:[cantidad]
   Ejemplo: AGREGAR:Coca-Cola 500ml:2
2. Para varios productos: AGREGAR:Coca-Cola 500ml:1|AGREGAR:Alfajor Havanna:2
3. Cuando el cliente quiera confirmar el pedido, pedile solo su nombre. La ubicación se obtiene automáticamente por GPS, no hace falta pedirla.
4. Cuando tengas el nombre: CONFIRMAR:[nombre]|gps
5. Respuestas cortas, máximo 2-3 oraciones. Sé natural y cálido.
6. Si no tenés algo, decilo y ofrecé alternativas.`;

let order = [];
let history = [];
let isLoading = false;
let orderDetailVisible = false;

function addMsg(html, who) {
  const w = document.getElementById('chatWindow');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + who;
  if (who === 'bot') {
    const name = document.createElement('div');
    name.className = 'sender-name';
    name.textContent = 'Oiga Bonita';
    wrap.appendChild(name);
  }
  const b = document.createElement('div');
  b.className = 'bubble ' + who;
  b.innerHTML = html;
  wrap.appendChild(b);
  w.appendChild(wrap);
  w.scrollTop = w.scrollHeight;
  return b;
}

function addTyping() {
  const w = document.getElementById('chatWindow');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  const name = document.createElement('div');
  name.className = 'sender-name';
  name.textContent = 'Oiga Bonita';
  wrap.appendChild(name);
  const b = document.createElement('div');
  b.className = 'bubble bot';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(b);
  w.appendChild(wrap);
  w.scrollTop = w.scrollHeight;
  return b;
}

function updateOrderUI() {
  const bar = document.getElementById('orderBar');
  if (order.length === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  const qty = order.reduce((a,i)=>a+i.qty,0);
  const total = order.reduce((a,i)=>a+i.price*i.qty,0);
  document.getElementById('orderCount').textContent = qty;
  document.getElementById('orderTotalBar').textContent = '$' + total.toLocaleString('es-AR');
  document.getElementById('orderTotalDetail').textContent = '$' + total.toLocaleString('es-AR');
  document.getElementById('orderItems').innerHTML = order.map(i =>
    `<div class="order-item-row"><span>${i.qty}x ${i.name}</span><span>$${(i.price*i.qty).toLocaleString('es-AR')}</span></div>`
  ).join('');
}

function toggleOrderDetail() {
  const d = document.getElementById('orderDetail');
  orderDetailVisible = !orderDetailVisible;
  d.style.display = orderDetailVisible ? 'block' : 'none';
}

function confirmarPedidoConNombre(nombre) {
  if (!navigator.geolocation) {
    addMsg('Tu dispositivo no soporta GPS. Por favor escribinos directamente al WhatsApp para coordinar la entrega.', 'bot');
    return;
  }
  addMsg('Un momento, estamos obteniendo tu ubicación GPS... 📍', 'bot');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lon = pos.coords.longitude.toFixed(6);
      const mapsLink = `https://maps.google.com/?q=${lat},${lon}`;
      const lines = order.map(i=>`• ${i.qty}x ${i.name} — $${(i.price*i.qty).toLocaleString('es-AR')}`).join('%0A');
      const total = order.reduce((a,i)=>a+i.price*i.qty,0);
      const msg = `Pedido *Oiga Bonita* 🛍️%0A%0A👤 *${nombre}*%0A%0A${lines}%0A%0A💰 *Total: $${total.toLocaleString('es-AR')}*%0A%0A📍 *Ubicación de entrega:*%0A${encodeURIComponent(mapsLink)}`;
      order = [];
      updateOrderUI();
      document.getElementById('orderDetail').style.display = 'none';
      orderDetailVisible = false;
      addMsg('Ubicación obtenida! Te abrimos WhatsApp con tu pedido. En breve te contactamos. 🛵', 'bot');
      setTimeout(()=>window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`,'_blank'), 400);
    },
    function(err) {
      let msg = 'Para poder entregarte el pedido necesitamos tu ubicación GPS. ';
      if (err.code === 1) msg += 'Parece que bloqueaste el permiso — habilitalo en la configuración de tu celular e intentá de nuevo.';
      else msg += 'No pudimos obtener tu ubicación. Verificá que el GPS esté activado e intentá de nuevo.';
      addMsg(msg, 'bot');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function confirmarPedido() {
  if (order.length === 0) return;
  confirmarPedidoConNombre(window._clienteName || 'Cliente');
}

function parseCommands(text) {
  let clean = text;
  const adds = [...text.matchAll(/AGREGAR:([^:\|]+):(\d+)/g)];
  for (const m of adds) {
    const name = m[1].trim();
    const qty = parseInt(m[2]);
    const prod = PRODUCTS.find(p=>p.name.toLowerCase()===name.toLowerCase());
    if (prod) {
      const ex = order.find(i=>i.name===prod.name);
      if (ex) ex.qty += qty;
      else order.push({...prod, qty});
    }
    clean = clean.replace(m[0],'');
  }
  const confirmMatch = text.match(/CONFIRMAR:([^|]+)\|gps/i);
  if (confirmMatch) {
    window._clienteName = confirmMatch[1].trim();
    clean = clean.replace(/CONFIRMAR:[^|]+\|gps/i,'').trim();
    setTimeout(()=> confirmarPedidoConNombre(window._clienteName), 300);
  }
  return clean.replace(/\|/g,'').trim();
}

async function callClaude(userMsg) {
  history.push({role:'user', content: userMsg});
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key': API_KEY,'anthropic-version':'2023-06-01'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:400,
      system: SYSTEM_PROMPT,
      messages: history
    })
  });
  if (!resp.ok) throw new Error('API error ' + resp.status);
  const data = await resp.json();
  const raw = data.content?.[0]?.text || 'Perdoná, hubo un problema. Intentá de nuevo.';
  history.push({role:'assistant', content: raw});
  return raw;
}

async function sendMsg() {
  const inp = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const txt = inp.value.trim();
  if (!txt || isLoading) return;
  inp.value = '';
  btn.disabled = true;
  addMsg(txt, 'user');
  isLoading = true;
  inp.disabled = true;
  const typing = addTyping();
  try {
    const raw = await callClaude(txt);
    const clean = parseCommands(raw);
    updateOrderUI();
    typing.innerHTML = clean.replace(/\n/g,'<br>');
  } catch(e) {
    typing.innerHTML = 'Hubo un error de conexión. Verificá que la API key esté configurada correctamente.';
  }
  isLoading = false;
  inp.disabled = false;
  btn.disabled = false;
  inp.focus();
  document.getElementById('chatWindow').scrollTop = 99999;
}

function sendQuick(txt) {
  document.getElementById('userInput').value = txt;
  document.getElementById('sendBtn').disabled = false;
  sendMsg();
}

document.getElementById('userInput').addEventListener('input', function() {
  document.getElementById('sendBtn').disabled = this.value.trim() === '';
});

addMsg('Hola! Bienvenido/a a <strong>Oiga Bonita</strong> 🛍️<br>Tenemos golosinas, bebidas, chocolates y cigarrillos. ¿En qué te puedo ayudar hoy?', 'bot');
</script>
</body>
</html>
